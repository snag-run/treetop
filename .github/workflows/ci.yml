name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    # Run on Linux and macOS so the platform-specific session scan
    # (session_linux.go / session_darwin.go) is built and tested on both.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - run: gofmt -l . | tee /dev/stderr | (! read)
      - run: go vet ./...
      - run: go test ./...
      - run: go build ./...
