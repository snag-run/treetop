name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Decide whether the build matrix needs to run. Docs/agent-config changes
  # (Markdown, .claude/) skip it entirely, so no billable macOS runner is
  # started. Changes under .github/ (incl. workflows) still run full CI so
  # they get validated. Detection uses plain git so we need no third-party
  # action (the repo's Actions policy only allows GitHub-owned + select actions).
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - id: filter
        env:
          BASE: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          HEAD: ${{ github.sha }}
        run: |
          set -u
          # First push of a branch has an all-zero "before"; fall back to the
          # single commit's file list.
          if [ -z "${BASE:-}" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
            changed=$(git show --name-only --pretty=format: "$HEAD")
          else
            changed=$(git diff --name-only "$BASE" "$HEAD")
          fi
          echo "Changed files:"
          printf '%s\n' "$changed"
          # A change counts as "code" unless every changed file is something we
          # deliberately ignore: Markdown or .claude/ agent config.
          code=$(printf '%s\n' "$changed" | grep -vE '(^$|\.md$|^\.claude/)' || true)
          if [ -n "$code" ]; then
            echo "code=true" >> "$GITHUB_OUTPUT"
            echo "=> code change: running build matrix"
          else
            echo "code=false" >> "$GITHUB_OUTPUT"
            echo "=> docs/config-only change: skipping build matrix"
          fi

  build:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    # Run on Linux and macOS so the platform-specific session scan
    # (session_linux.go / session_darwin.go) is built and tested on both.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"
            echo "$unformatted"
            exit 1
          fi
      - run: go vet ./...
      - run: go test ./...
      - run: go build ./...

  # Single required status check. Passes when the build matrix succeeded, or
  # was skipped for a docs/config-only change. Mark THIS job as required in
  # branch protection (not the individual "build (…)" matrix contexts, which
  # never report when the matrix job is skipped).
  ci:
    needs: [changes, build]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify build result
        run: |
          changes='${{ needs.changes.result }}'
          build='${{ needs.build.result }}'
          echo "changes=$changes build=$build"
          if [ "$changes" != "success" ]; then
            echo "changes job did not succeed."
            exit 1
          fi
          # "skipped" == docs/config-only change (allowed); "success" == build passed.
          if [ "$build" = "success" ] || [ "$build" = "skipped" ]; then
            echo "CI gate passed."
          else
            echo "CI gate failed (build: $build)."
            exit 1
          fi
